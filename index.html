<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Kitchen Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="navbar">
    <div class="logo">LUXURY <span>DINING</span></div>
</header>

<section class="hero">
    <h1>Таңдаулы Мәзір</h1>
    <p>Әрбір тағам — аспаздық өнер туындысы</p>
</section>

<div class="container">
    <div class="menu-grid">
        <div class="menu-item" onclick="openModal('steak')">
            <img src="https://images.unsplash.com/photo-1546241072-48010ad28c2c?w=500" alt="Стейк">
            <div class="menu-info">
                <h3>Рибай Стейк</h3>
                <span class="price">8 500 ₸</span>
                <p>Нәзік сиыр еті мен арнайы соус...</p>
            </div>
        </div>

        <div class="menu-item" onclick="openModal('pasta')">
            <img src="https://images.unsplash.com/photo-1546549032-9571cd6b27df?w=500" alt="Паста">
            <div class="menu-info">
                <h3>Теңіз өнімдері пастасы</h3>
                <span class="price">4 200 ₸</span>
                <p>Итальяндық классика, асшаяндармен...</p>
            </div>
        </div>

        <div class="menu-item" onclick="openModal('dessert')">
            <img src="https://images.unsplash.com/photo-1551024601-bec78aea704b?w=500" alt="Тәтті">
            <div class="menu-info">
                <h3>Шоколадты Фондан</h3>
                <span class="price">2 500 ₸</span>
                <p>Ыстық шоколад пен балмұздақ...</p>
            </div>
        </div>
    </div>
</div>

<div id="recipeModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle"></h2>
        <div class="modal-body">
            <div id="modalIngredients"></div>
            <div id="modalRecipe"></div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
