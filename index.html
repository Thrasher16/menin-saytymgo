<!DOCTYPE html>
<html lang="kk">
<head>
    <meta charset="UTF-8">
    <meta AKZHAR CHICKEN | Тез әрі Дәмді</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Roboto:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<header class="navbar">
    <div class="logo">AKZHAR<span>FAST FOOD</span></div>
</header>

<section class="promo-banner">
    <h1>ЫСТЫҚ ЖӘНЕ ДӘМДІ!</h1>
    <p>Ең үздік ингредиенттерден жасалған фастфуд</p>
</section>

<div class="container">
    <div class="menu-grid">
        <div class="menu-item burger" onclick="openModal('cheeseburger')">
            <div class="badge">TOP</div>
            <img src="https://images.unsplash.com/photo-1568901346375-23c9450c58cd?w=500" alt="Чизбургер">
            <div class="menu-info">
                <h3>Чизбургер XL</h3>
                <span class="price">800 ₸</span>
                <button class="order-btn">Рецептін көру</button>
            </div>
        </div>

        <div class="menu-item side" onclick="openModal('fries')">
            <img src="https://images.unsplash.com/photo-1573080496219-bb080dd4f877?w=500" alt="Фри">
            <div class="menu-info">
                <h3>Картоп Фри</h3>
                <span class="price">600 ₸</span>
                <button class="order-btn">Рецептін көру</button>
            </div>
        </div>

        <div class="menu-item chicken" onclick="openModal('nuggets')">
            <img src="https://images.unsplash.com/photo-1562967914-608f82629710?w=500" alt="Наггетстер">
            <div class="menu-info">
                <h3>Чикен Наггетс (9 дана)</h3>
                <span class="price">900 ₸</span>
                <button class="order-btn">Рецептін көру</button>
            </div>
        </div>
    </div>
</div>

<div id="recipeModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <h2 id="modalTitle"></h2>
        <div id="modalIngredients"></div>
        <hr>
        <div id="modalRecipe"></div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
